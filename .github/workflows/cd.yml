# CD workflow — deploy backend + frontend to GKE cluster after CI succeeds on main.
# Called by CI workflow after test + build pass.
# Requires GitHub Secrets: GCP_SA_KEY, DATABASE_URL, AUTH_SECRET, OPENAI_API_KEY

name: CD

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: todo-platform-489221
  REGION: us-central1
  REPO: learnflow-repo
  GKE_CLUSTER: todo-cluster
  GKE_ZONE: us-central1-a
  NAMESPACE: learnflow

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Create namespace
        run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update secrets
        run: |
          kubectl create secret generic learnflow-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal="database-url=${{ secrets.DATABASE_URL }}" \
            --from-literal="auth-secret=${{ secrets.AUTH_SECRET }}" \
            --from-literal="openai-api-key=${{ secrets.OPENAI_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # --- Deploy Backend (6 agents) ---
      - name: Update backend manifest with new image tag
        run: |
          sed -i "s|image: .*learnflow-agent.*|image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/learnflow-agent:${{ inputs.image_tag }}|" \
            .claude/skills/fastapi-dapr-agent/scripts/templates/k8s/gke-deployment.yaml

      - name: Deploy backend agents
        run: |
          kubectl apply -f .claude/skills/fastapi-dapr-agent/scripts/templates/k8s/gke-deployment.yaml

      - name: Verify backend rollout
        run: |
          for agent in triage concepts codereview debug exercise progress; do
            echo "Waiting for ${agent}-agent..."
            kubectl rollout status deployment/${agent}-agent \
              -n ${{ env.NAMESPACE }} --timeout=120s || true
          done

      # --- Deploy Frontend ---
      - name: Update frontend manifest with new image tag
        run: |
          sed -i "s|image: .*learnflow-frontend.*|image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/learnflow-frontend:${{ inputs.image_tag }}|" \
            .claude/skills/nextjs-k8s-deploy/scripts/templates/k8s/gke-deployment.yaml

      - name: Deploy frontend
        run: |
          kubectl apply -f .claude/skills/nextjs-k8s-deploy/scripts/templates/k8s/gke-deployment.yaml

      - name: Verify frontend rollout
        run: |
          kubectl rollout status deployment/learnflow-frontend \
            -n ${{ env.NAMESPACE }} --timeout=120s

      # --- Health Check ---
      - name: Health check
        run: |
          EXTERNAL_IP=$(kubectl get svc learnflow-frontend \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -n "$EXTERNAL_IP" ]; then
            curl --fail --retry 5 --retry-delay 10 \
              "http://${EXTERNAL_IP}/" || {
              echo "Health check failed — app may still be starting"
            }
            echo ""
            echo "LearnFlow is live at: http://${EXTERNAL_IP}"
          else
            echo "No external IP found — LoadBalancer may still be provisioning"
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          echo ""
          echo "=== Frontend logs ==="
          kubectl logs -l app=learnflow-frontend -n ${{ env.NAMESPACE }} --tail=50 || true

          echo ""
          echo "=== Backend logs (triage) ==="
          kubectl logs -l app=triage-agent -n ${{ env.NAMESPACE }} --tail=30 || true

          echo ""
          echo "=== Events ==="
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' | tail -20

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/skills/nextjs-k8s-deploy/scripts/templates/k8s/gke-deployment.yaml
          git add .claude/skills/fastapi-dapr-agent/scripts/templates/k8s/gke-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ inputs.image_tag }}"
          git push
