name: Build & Deploy LearnFlow

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/nextjs-k8s-deploy/scripts/templates/app/**'
      - '.github/workflows/deploy.yaml'

env:
  PROJECT_ID: todo-platform-489221
  REGION: us-central1
  REPO: learnflow-repo
  IMAGE: learnflow-frontend
  GKE_CLUSTER: todo-cluster
  GKE_ZONE: us-central1-a

jobs:
  build-and-push:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest \
                       .claude/skills/nextjs-k8s-deploy/scripts/templates/app

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

      - name: Update K8s manifest with new image tag
        run: |
          sed -i "s|image: .*learnflow-frontend.*|image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}|" \
            .claude/skills/nextjs-k8s-deploy/scripts/templates/k8s/gke-deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/skills/nextjs-k8s-deploy/scripts/templates/k8s/gke-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
